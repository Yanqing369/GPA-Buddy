    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');
        
        body {
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        
        /* 多邻国绿色 */
        .duo-green {
            color: #58CC02;
        }
        .bg-duo-green {
            background-color: #58CC02;
        }
        .bg-duo-green:hover {
            background-color: #4CAF02;
        }
        .border-duo-green {
            border-color: #58CC02;
        }
        
        /* 猫头鹰吉祥物动画 */
        @keyframes bounce {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-10px) rotate(-3deg); }
            50% { transform: translateY(0) rotate(0deg); }
            75% { transform: translateY(-5px) rotate(3deg); }
        }
        
        @keyframes blink {
            0%, 90%, 100% { transform: scaleY(1); }
            95% { transform: scaleY(0.1); }
        }
        
        @keyframes wing {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(-10deg); }
        }
        
        .mascot-bounce {
            animation: bounce 3s ease-in-out infinite;
        }
        
        .owl-eye {
            animation: blink 4s ease-in-out infinite;
            transform-origin: center;
        }
        
        .owl-wing-left {
            animation: wing 2s ease-in-out infinite;
            transform-origin: 20% 50%;
        }
        
        .owl-wing-right {
            animation: wing 2s ease-in-out infinite reverse;
            transform-origin: 80% 50%;
        }
        
        /* 功能卡片悬停效果 */
        .feature-card {
            transition: all 0.2s ease;
            box-shadow: 0 4px 0 rgba(0,0,0,0.1);
        }
        
        .feature-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 0 rgba(0,0,0,0.15);
        }
        
        .feature-card:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 rgba(0,0,0,0.1);
        }
        
        /* 底部滚动条 */
        .scroll-container {
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .scroll-container::-webkit-scrollbar {
            display: none;
        }
        
        /* 语言/功能标签 */
        .lang-tag {
            transition: all 0.2s ease;
            box-shadow: 0 3px 0 rgba(0,0,0,0.1);
        }
        .lang-tag:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 0 rgba(0,0,0,0.15);
        }
        .lang-tag:active {
            transform: translateY(1px);
            box-shadow: 0 2px 0 rgba(0,0,0,0.1);
        }
        
        /* 按钮样式 */
        .btn-primary {
            box-shadow: 0 4px 0 #4CAF02;
            transition: all 0.1s ease;
        }
        .btn-primary:hover {
            box-shadow: 0 6px 0 #4CAF02;
            transform: translateY(-2px);
        }
        .btn-primary:active {
            box-shadow: 0 2px 0 #4CAF02;
            transform: translateY(2px);
        }
        
        .btn-secondary {
            box-shadow: 0 4px 0 #e5e7eb;
            transition: all 0.1s ease;
        }
        .btn-secondary:hover {
            box-shadow: 0 6px 0 #e5e7eb;
            transform: translateY(-2px);
            background-color: #f3f4f6;
        }
        .btn-secondary:active {
            box-shadow: 0 2px 0 #e5e7eb;
            transform: translateY(2px);
        }
        
        /* 进度环动画 */
        @keyframes progress {
            from { stroke-dashoffset: 283; }
            to { stroke-dashoffset: 70; }
        }
        
        .progress-ring-circle {
            animation: progress 2s ease-out forwards;
        }
    </style>

    <script>
        const API_BASE = "https://moyuxiaowu.org";
        const DB_NAME = 'ExamBuddyDB_Clean_v2';
        
        const db = new Dexie(DB_NAME);
        db.version(5).stores({
            questionBanks: '++id, name, createdAt, updatedAt',
            practiceProgress: '++id, bankId, lastPracticeAt',
            sourceFiles: '++id, name, safeName, bankId, data, createdAt',
            settings: 'key'
        });

        let currentLang = localStorage.getItem('language') || 'zh';

        const i18n = {
            zh: {
                langDisplay: '网站语言 中文',
                heroTitle: 'AI 帮你出题，',
                heroSubtitle: '刷题更高效！',
                card1Title: '上传资料出题',
                card1Desc: 'PDF、Word、PPT 都能用',
                card2Title: '整理已有题目',
                card2Desc: '快速整理成规范题库',
                card3Title: '我的题库',
                card3Desc: '练习、复习、导出题目',
                haveBankBtn: '已有题库',
                recentTitle: '最近题库',
                noRecent: '暂无题库',
                viewAllBtn: '查看全部题库'
            },
            en: {
                langDisplay: 'Language English',
                heroTitle: 'Let AI create questions,',
                heroSubtitle: 'Study smarter!',
                card1Title: 'Upload & Generate',
                card1Desc: 'PDF, Word, PPT supported',
                card2Title: 'Organize Questions',
                card2Desc: 'Convert to standard format',
                card3Title: 'My Question Banks',
                card3Desc: 'Practice, review, export',
                haveBankBtn: 'I have a bank',
                recentTitle: 'Recent Banks',
                noRecent: 'No banks yet',
                viewAllBtn: 'View All Banks'
            }
        };

        function t(key) {
            return i18n[currentLang]?.[key] || key;
        }

        function updateLanguage() {
            document.getElementById('langDisplay').textContent = t('langDisplay');
            document.getElementById('heroTitle').textContent = t('heroTitle');
            document.getElementById('heroSubtitle').textContent = t('heroSubtitle');
            document.getElementById('card1Title').textContent = t('card1Title');
            document.getElementById('card1Desc').textContent = t('card1Desc');
            document.getElementById('card2Title').textContent = t('card2Title');
            document.getElementById('card2Desc').textContent = t('card2Desc');
            document.getElementById('card3Title').textContent = t('card3Title');
            document.getElementById('card3Desc').textContent = t('card3Desc');
            document.getElementById('haveBankBtn').textContent = t('haveBankBtn');
            document.getElementById('recentTitle').textContent = t('recentTitle');
            document.getElementById('noRecent').textContent = t('noRecent');
            document.getElementById('viewAllBtn').textContent = t('viewAllBtn');
        }

        function toggleLang() {
            currentLang = currentLang === 'zh' ? 'en' : 'zh';
            localStorage.setItem('language', currentLang);
            updateLanguage();
        }

        async function showRecent() {
            const modal = document.getElementById('recentModal');
            modal.classList.remove('hidden');
            
            const banks = await db.questionBanks.orderBy('createdAt').reverse().limit(5).toArray();
            const container = document.getElementById('recentList');
            
            if (banks.length === 0) {
                container.innerHTML = `<div class="text-gray-400 text-center py-8">${t('noRecent')}</div>`;
                return;
            }
            
            container.innerHTML = banks.map(bank => `
                <a href="practice.html?id=${bank.id}" class="flex items-center justify-between p-4 bg-gray-50 rounded-xl hover:bg-gray-100 transition-colors border-2 border-transparent hover:border-duo-green">
                    <div class="flex items-center">
                        <div class="w-10 h-10 bg-duo-green rounded-xl flex items-center justify-center mr-3">
                            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                            </svg>
                        </div>
                        <div>
                            <div class="font-bold text-gray-800">${bank.name}</div>
                            <div class="text-sm text-gray-400">${bank.questions.length} ${currentLang === 'en' ? 'questions' : '题'}</div>
                        </div>
                    </div>
                    <svg class="w-5 h-5 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                    </svg>
                </a>
            `).join('');
        }

        function closeRecent() {
            document.getElementById('recentModal').classList.add('hidden');
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const msg = document.getElementById('toastMessage');
            
            msg.textContent = message;
            toast.classList.remove('translate-y-20', 'opacity-0');
            
            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 3000);
        }

        // 点击弹窗外部关闭
        document.getElementById('recentModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeRecent();
            }
        });

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            updateLanguage();
        });
    </script>
</body>
</html>
