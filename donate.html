<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Developer | 支持开发者</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Sans+TC:wght@300;400;500;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --paper-bg: #FAF9F6;
            --card-bg: rgba(255, 255, 255, 0.72);
            --forest: #86efac;
            --forest-dark: #22c55e;
            --purple-soft: #e9d5ff;
            --blue-soft: #bfdbfe;
            --orange-soft: #fed7aa;
            --text-primary: #1c1c1e;
            --text-secondary: #6b7280;
        }
        
        body {
            font-family: 'Inter', 'Noto Sans SC', 'Noto Sans TC', 'Noto Sans KR', sans-serif;
            background-color: var(--paper-bg);
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
        }
        
        .glass-nav {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-bottom: 1px solid rgba(0, 0, 0, 0.04);
        }
        
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.02), 0 2px 8px rgba(0, 0, 0, 0.01);
        }
        
        .glass-panel {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.02), 0 2px 8px rgba(0, 0, 0, 0.01);
        }
        
        .payment-tab {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(255, 255, 255, 0.4);
        }
        
        .payment-tab.active {
            background: rgba(34, 197, 94, 0.15);
            border-color: rgba(34, 197, 94, 0.8);
            box-shadow: 0 0 20px rgba(34, 197, 94, 0.2);
            transform: translateY(-2px);
        }
        
        .qr-container {
            background: white;
            padding: 1.5rem;
            border-radius: 1.5rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }
        
        .lang-btn {
            transition: all 0.2s;
            background: rgba(255, 255, 255, 0.5);
            color: var(--text-primary);
            border: 1px solid rgba(0, 0, 0, 0.1);
        }
        
        .lang-btn:hover {
            background: rgba(255, 255, 255, 0.8);
        }
        
        .lang-btn.active {
            background: rgba(34, 197, 94, 0.8);
            color: white;
            border-color: rgba(34, 197, 94, 0.8);
        }
        
        .fade-in {
            animation: fadeIn 0.4s ease-in;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .badge-hk {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white;
            font-size: 0.625rem;
            padding: 0.125rem 0.375rem;
            border-radius: 0.25rem;
            font-weight: 700;
            text-transform: uppercase;
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <div class="w-full max-w-md">
        
        <!-- Language Switcher -->
        <div class="flex justify-center gap-2 mb-6">
            <button onclick="switchLang('sc')" class="lang-btn px-4 py-2 rounded-full text-sm font-medium" data-lang-btn="sc">简</button>
            <button onclick="switchLang('tc')" class="lang-btn px-4 py-2 rounded-full text-sm font-medium" data-lang-btn="tc">繁</button>
            <button onclick="switchLang('en')" class="lang-btn active px-4 py-2 rounded-full text-sm font-medium" data-lang-btn="en">EN</button>
            <button onclick="switchLang('kr')" class="lang-btn px-4 py-2 rounded-full text-sm font-medium" data-lang-btn="kr">한</button>
        </div>

        <!-- Main Card -->
        <div class="glass-panel rounded-3xl p-6 space-y-6">
            
            <!-- Header -->
            <div class="text-center">
                <div class="inline-flex items-center justify-center w-14 h-14 rounded-full bg-gradient-to-br from-indigo-500 to-purple-600 mb-3 shadow-lg shadow-indigo-500/30">
                    <svg class="w-7 h-7 text-white" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M3.172 5.172a4 4 0 015.656 0L10 6.343l1.172-1.171a4 4 0 115.656 5.656L10 17.657l-6.828-6.829a4 4 0 010-5.656z" clip-rule="evenodd"></path>
                    </svg>
                </div>
                <h1 class="text-2xl font-bold text-slate-900 mb-1" data-i18n="title">Support Developer</h1>
                <p class="text-slate-500 text-sm" data-i18n="subtitle">Choose payment method & scan QR code</p>
            </div>

            <!-- Payment Methods -->
            <div class="space-y-3">
                <div class="grid grid-cols-2 gap-3">
                    <!-- Alipay Mainland -->
                    <button onclick="switchMethod('alipay')" class="payment-tab active flex items-center justify-center gap-2 py-3 px-3 rounded-xl border border-slate-200 text-slate-700 font-medium" data-method="alipay">
                        <svg class="w-6 h-6 text-blue-400" viewBox="0 0 24 24" fill="currentColor">
                            <circle cx="12" cy="12" r="10" opacity="0.2"/>
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/>
                        </svg>
                        <div class="flex flex-col items-start">
                            <span class="text-sm font-bold" data-i18n="alipay">Alipay</span>
                            <span class="text-[10px] text-slate-500">CNY</span>
                        </div>
                    </button>
                    
                    <!-- WeChat Pay -->
                    <button onclick="switchMethod('wechat')" class="payment-tab flex items-center justify-center gap-2 py-3 px-3 rounded-xl border border-slate-200 text-slate-700 font-medium" data-method="wechat">
                        <svg class="w-6 h-6 text-green-400" viewBox="0 0 24 24" fill="currentColor">
                            <circle cx="12" cy="12" r="10" opacity="0.2"/>
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/>
                        </svg>
                        <div class="flex flex-col items-start">
                            <span class="text-sm font-bold" data-i18n="wechat">WeChat Pay</span>
                            <span class="text-[10px] text-slate-500">CNY</span>
                        </div>
                    </button>
                    
                    <!-- AlipayHK -->
                    <button onclick="switchMethod('alipayhk')" class="payment-tab flex items-center justify-center gap-2 py-3 px-3 rounded-xl border border-slate-200 text-slate-700 font-medium" data-method="alipayhk">
                        <svg class="w-6 h-6 text-blue-500" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                        </svg>
                        <div class="flex flex-col items-start">
                            <span class="text-sm font-bold flex items-center gap-1">
                                <span data-i18n="alipayhk">AlipayHK</span>
                                <span class="badge-hk">HK</span>
                            </span>
                            <span class="text-[10px] text-slate-500">HKD</span>
                        </div>
                    </button>
                    
                    <!-- FPS -->
                    <button onclick="switchMethod('fps')" class="payment-tab flex items-center justify-center gap-2 py-3 px-3 rounded-xl border border-slate-200 text-slate-700 font-medium" data-method="fps">
                        <svg class="w-6 h-6 text-orange-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                        </svg>
                        <div class="flex flex-col items-start">
                            <span class="text-sm font-bold" data-i18n="fps">FPS</span>
                            <span class="text-[10px] text-slate-500">HKD</span>
                        </div>
                    </button>
                </div>
            </div>

            <!-- QR Code Display Area -->
            <div id="qrDisplayArea" class="space-y-4 fade-in">
                
                <!-- QR Container -->
                <div class="flex justify-center">
                    <div class="qr-container">
                        <!-- Alipay Mainland -->
                        <div id="qr-alipay" class="qr-content block">
                            <img src="alipay.jpg" alt="Alipay" class="w-[220px] h-[220px] object-contain rounded-lg" 
                                 onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22220%22 height=%22220%22%3E%3Crect fill=%22%23f1f5f9%22 width=%22220%22 height=%22220%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%2364748b%22 font-size=%2214%22%3EAlipay QR%3C/text%3E%3C/svg%3E'">
                        </div>

                        <!-- WeChat Pay -->
                        <div id="qr-wechat" class="qr-content hidden">
                            <img src="wechat.jpg" alt="WeChat Pay" class="w-[220px] h-[220px] object-contain rounded-lg"
                                 onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22220%22 height=%22220%22%3E%3Crect fill=%22%23f0fdf4%22 width=%22220%22 height=%22220%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23166534%22 font-size=%2214%22%3EWeChat QR%3C/text%3E%3C/svg%3E'">
                        </div>

                        <!-- AlipayHK -->
                        <div id="qr-alipayhk" class="qr-content hidden">
                            <img src="alipayhk.jpg" alt="AlipayHK" class="w-[220px] h-[220px] object-contain rounded-lg"
                                 onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22220%22 height=%22220%22%3E%3Crect fill=%22%23eff6ff%22 width=%22220%22 height=%22220%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%231d4ed8%22 font-size=%2214%22%3EAlipayHK QR%3C/text%3E%3C/svg%3E'">
                        </div>

                        <!-- FPS -->
                        <div id="qr-fps" class="qr-content hidden">
                            <img src="fps.jpg" alt="FPS" class="w-[220px] h-[220px] object-contain rounded-lg"
                                 onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22220%22 height=%22220%22%3E%3Crect fill=%22%23fff7ed%22 width=%22220%22 height=%22220%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%239a3412%22 font-size=%2214%22%3EFPS QR%3C/text%3E%3C/svg%3E'">
                        </div>
                    </div>
                </div>

                <!-- Encouragement Text -->
                <p class="text-center text-slate-600 font-medium text-lg" data-i18n="encouragement">
                    Your support is the greatest encouragement to developers
                </p>

                <!-- FPS ID Copy (Only for FPS) -->
                <div id="fpsCopy" class="hidden bg-orange-100/50 border border-orange-200 rounded-xl p-3">
                    <div class="flex justify-between items-center">
                        <span class="text-orange-600 text-sm font-medium" data-i18n="fpsid">FPS ID</span>
                        <button onclick="copyFPS()" class="text-xs bg-orange-200 text-orange-700 px-3 py-1.5 rounded-lg hover:bg-orange-300 transition-colors" data-i18n="copy">
                            Copy
                        </button>
                    </div>
                    <p class="text-slate-900 font-mono text-lg mt-1 select-all">108994443</p>
                </div>
            </div>

            <!-- QR Hint Text -->
            <p class="text-center text-slate-600 text-sm" data-i18n="qrHint">
                请扫描二维码完成捐款，金额不限
            </p>
            
            <!-- Back Button -->
            <a href="index.html" class="w-full block text-center bg-slate-200 hover:bg-slate-300 text-slate-800 font-medium py-3 rounded-xl transition-colors">
                <span data-i18n="backToHome">返回首页</span>
            </a>
        </div>
    </div>

    <!-- Thanks Modal -->
    <div id="thanksModal" class="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-50 hidden p-4">
        <div class="glass-panel rounded-3xl p-8 max-w-sm w-full text-center transform scale-95 opacity-0 transition-all duration-300" id="modalContent">
            <div class="w-16 h-16 bg-gradient-to-br from-emerald-400 to-green-600 rounded-full flex items-center justify-center mx-auto mb-4 shadow-lg shadow-emerald-500/30">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/>
                </svg>
            </div>
            <h3 class="text-2xl font-bold text-slate-900 mb-2" data-i18n="thanks">Thank You!</h3>
            <p class="text-slate-500 mb-6" data-i18n="thanksMsg">Your support means the world to me 🙏</p>
            <button onclick="closeModal()" class="w-full bg-slate-200 hover:bg-slate-300 text-slate-800 font-medium py-3 rounded-xl transition-colors" data-i18n="close">
                Close
            </button>
        </div>
    </div>

    <script>
        const i18n = {
            sc: {
                title: "支持开发者",
                subtitle: "选择支付方式，扫码打赏",
                alipay: "支付宝",
                wechat: "微信支付",
                alipayhk: "AlipayHK",
                fps: "转数快",
                encouragement: "您的支持是对开发者最大的鼓励",
                fpsid: "FPS 识别码",
                copy: "复制",
                qrHint: "请扫描二维码完成捐款，金额不限",
                backToHome: "返回首页",
                thanks: "感谢您的支持！",
                thanksMsg: "您的打赏是对我最大的鼓励 🙏",
                close: "关闭",
                copied: "已复制"
            },
            tc: {
                title: "支持開發者",
                subtitle: "選擇支付方式，掃碼打賞",
                alipay: "支付寶",
                wechat: "微信支付",
                alipayhk: "AlipayHK",
                fps: "轉數快",
                encouragement: "您的支持是對開發者最大的鼓勵",
                fpsid: "FPS 識別碼",
                copy: "複製",
                qrHint: "請掃描二維碼完成捐款，金額不限",
                backToHome: "返回首頁",
                thanks: "感謝您的支持！",
                thanksMsg: "您的打賞是對我最大的鼓勵 🙏",
                close: "關閉",
                copied: "已複製"
            },
            en: {
                title: "Support Developer",
                subtitle: "Choose payment method & scan QR code",
                alipay: "Alipay",
                wechat: "WeChat Pay",
                alipayhk: "AlipayHK",
                fps: "FPS",
                encouragement: "Your support is the greatest encouragement for developer",
                fpsid: "FPS ID",
                copy: "Copy",
                qrHint: "Please scan QR code to donate, any amount is welcome",
                backToHome: "Back to Home",
                thanks: "Thank You!",
                thanksMsg: "Your support means the world to me 🙏",
                close: "Close",
                copied: "Copied"
            },
            kr: {
                title: "개발자 후원",
                subtitle: "결제 수단을 선택하고 QR코드를 스캔하세요",
                alipay: "알리페이",
                wechat: "위챗페이",
                alipayhk: "알리페이HK",
                fps: "FPS",
                encouragement: "개발자에게 큰 힘이 됩니다",
                fpsid: "FPS ID",
                copy: "복사",
                confirm: "결제 완료",
                thanks: "후원 감사합니다!",
                thanksMsg: "응원해 주셔서 감사합니다 🙏",
                close: "닫기",
                copied: "복사됨"
            }
        };

        let currentLang = 'en';
        let currentMethod = 'alipay';

        // 检测浏览器语言
        function detectBrowserLanguage() {
            const lang = navigator.language || navigator.userLanguage || 'en';
            const langCode = lang.toLowerCase();
            
            // 简中：zh-cn, zh-sg
            if (langCode.startsWith('zh-cn') || langCode.startsWith('zh-sg')) {
                return 'sc';
            }
            // 繁中：zh-tw, zh-hk, zh-mo
            else if (langCode.startsWith('zh-tw') || langCode.startsWith('zh-hk') || langCode.startsWith('zh-mo')) {
                return 'tc';
            }
            // 韩语：ko, ko-kr
            else if (langCode.startsWith('ko')) {
                return 'kr';
            }
            // 默认英文
            return 'en';
        }

        function switchLang(lang) {
            currentLang = lang;
            
            // Update buttons
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.langBtn === lang) {
                    btn.classList.add('active');
                }
            });
            
            // Update all text elements
            const texts = i18n[lang];
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.dataset.i18n;
                if (texts[key]) {
                    el.textContent = texts[key];
                }
            });
            
            // Update FPS ID label if visible
            if (currentMethod === 'fps') {
                document.querySelector('[data-i18n="fpsid"]').textContent = texts.fpsid;
            }
        }

        function switchMethod(method) {
            currentMethod = method;
            
            // Update tabs
            document.querySelectorAll('.payment-tab').forEach(tab => {
                tab.classList.remove('active');
                if (tab.dataset.method === method) {
                    tab.classList.add('active');
                }
            });
            
            // Update QR display
            document.querySelectorAll('.qr-content').forEach(qr => {
                qr.classList.add('hidden');
                qr.classList.remove('block');
            });
            
            const targetQr = document.getElementById(`qr-${method}`);
            if (targetQr) {
                targetQr.classList.remove('hidden');
                targetQr.classList.add('block');
            }
            
            // Show/hide FPS copy section
            const fpsCopy = document.getElementById('fpsCopy');
            if (method === 'fps') {
                fpsCopy.classList.remove('hidden');
            } else {
                fpsCopy.classList.add('hidden');
            }
            
            // Animation
            const displayArea = document.getElementById('qrDisplayArea');
            displayArea.classList.remove('fade-in');
            void displayArea.offsetWidth;
            displayArea.classList.add('fade-in');
        }

        function copyFPS() {
            navigator.clipboard.writeText('108994443').then(() => {
                const btn = event.target;
                const originalText = btn.textContent;
                btn.textContent = i18n[currentLang].copied;
                setTimeout(() => {
                    btn.textContent = i18n[currentLang].copy;
                }, 2000);
            });
        }

        function showThanks() {
            const modal = document.getElementById('thanksModal');
            const content = document.getElementById('modalContent');
            
            modal.classList.remove('hidden');
            setTimeout(() => {
                content.classList.remove('scale-95', 'opacity-0');
                content.classList.add('scale-100', 'opacity-100');
            }, 10);
        }

        function closeModal() {
            const modal = document.getElementById('thanksModal');
            const content = document.getElementById('modalContent');
            
            content.classList.remove('scale-100', 'opacity-100');
            content.classList.add('scale-95', 'opacity-0');
            
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
        }

        // Close modal on outside click
        document.getElementById('thanksModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });

        // 页面加载时自动检测浏览器语言并切换
        document.addEventListener('DOMContentLoaded', function() {
            const browserLang = detectBrowserLanguage();
            switchLang(browserLang);
        });
    </script>
</body>
</html>
