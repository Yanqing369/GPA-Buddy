<!DOCTYPE html>
<html lang="zh-CN" class="overflow-x-hidden">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="pageTitle">知识导学</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/dexie@3.2.4/dist/dexie.js"></script>
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/asciimath2tex@1/dist/asciimath2tex.umd.js"></script>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    <script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://unpkg.com/@pdf-lib/fontkit@1.1.1/dist/fontkit.umd.js"></script>
    <script src="https://unpkg.com/pptxtojson@latest/dist/index.umd.js"></script>
    <script src="document-converter.js"></script>
    <script src="fileViewer.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap');
        :root {
            --paper-bg: #FAF9F6;
            --card-bg: rgba(255, 255, 255, 0.72);
            --forest: #86efac;
            --forest-dark: #22c55e;
            --purple-soft: #e9d5ff;
            --blue-soft: #bfdbfe;
            --orange-soft: #fed7aa;
            --text-primary: #1c1c1e;
            --text-secondary: #6b7280;
        }
        body {
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
            background: linear-gradient(180deg, #ffffff 0%, #f0fdf4 100%);
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
        }

        /* KaTeX 自动换行 */
        .katex {
            white-space: normal !important;
            word-break: break-word;
        }
        .katex-display {
            overflow-x: auto;
            max-width: 100%;
            padding: 0.5em 0;
        }
        .glass-nav {
            background: linear-gradient(135deg, rgba(255,255,255,0.82) 0%, rgba(255,251,235,0.85) 50%, rgba(254,252,232,0.88) 100%);
            backdrop-filter: blur(24px) saturate(200%);
            -webkit-backdrop-filter: blur(24px) saturate(200%);
            border-bottom: 1px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 1px 0 rgba(0, 0, 0, 0.02), inset 0 -1px 0 rgba(255, 255, 255, 0.5);
        }
        .glass-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0.7) 50%, rgba(250,249,246,0.85) 100%);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08), 0 2px 8px rgba(0, 0, 0, 0.04), inset 0 1px 0 rgba(255, 255, 255, 0.9), inset 0 -1px 0 rgba(0, 0, 0, 0.02);
            position: relative;
            overflow: hidden;
        }
        .liquid-btn {
            background: linear-gradient(135deg, rgba(255,255,255,0.95) 0%, rgba(250,249,246,0.9) 100%);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08), 0 1px 4px rgba(0, 0, 0, 0.04), inset 0 1px 0 rgba(255, 255, 255, 1), inset 0 -1px 0 rgba(0, 0, 0, 0.02);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .liquid-btn:hover {
            background: linear-gradient(135deg, rgba(255,255,255,1) 0%, rgba(252,251,248,0.95) 100%);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12), 0 2px 8px rgba(0, 0, 0, 0.06), inset 0 1px 0 rgba(255, 255, 255, 1), inset 0 -1px 0 rgba(0, 0, 0, 0.02);
            transform: translateY(-2px);
        }
        .liquid-btn:active { transform: scale(0.98) translateY(0); }
        .liquid-btn-emerald {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.9) 0%, rgba(5, 150, 105, 0.95) 100%);
            border: 1px solid rgba(52, 211, 153, 0.5);
            box-shadow: 0 4px 16px rgba(16, 185, 129, 0.3), 0 1px 4px rgba(0, 0, 0, 0.1), inset 0 1px 0 rgba(167, 243, 208, 0.5), inset 0 -1px 0 rgba(0, 0, 0, 0.1);
            color: white;
        }
        .liquid-btn-emerald:hover {
            background: linear-gradient(135deg, rgba(52, 211, 153, 0.95) 0%, rgba(16, 185, 129, 1) 100%);
            box-shadow: 0 8px 24px rgba(16, 185, 129, 0.4), 0 2px 8px rgba(0, 0, 0, 0.1), inset 0 1px 0 rgba(167, 243, 208, 0.6), inset 0 -1px 0 rgba(0, 0, 0, 0.1);
        }
        .squircle { border-radius: 24px; }
        .spring-active:active { transform: scale(0.96); }
        .drop-zone {
            border: 2px dashed rgba(148, 163, 184, 0.4);
            background: linear-gradient(135deg, rgba(255,255,255,0.6) 0%, rgba(248,250,252,0.5) 100%);
            transition: all 0.3s ease;
        }
        .drop-zone:hover, .drop-zone.dragover {
            border-color: rgba(99, 102, 241, 0.6);
            background: linear-gradient(135deg, rgba(238,242,255,0.7) 0%, rgba(224,231,255,0.5) 100%);
        }
        .step-item { display: flex; align-items: center; gap: 0.75rem; font-size: 0.875rem; }
        .step-item.active { color: #4f46e5; font-weight: 500; }
        .step-item.completed { color: #10b981; font-weight: 500; }
        .step-number {
            width: 24px; height: 24px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.75rem; font-weight: 600;
            background: #e2e8f0; color: #64748b;
        }
        .step-item.active .step-number { background: #6366f1; color: white; }
        .step-item.completed .step-number { background: #10b981; color: white; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.08); border-radius: 4px; }
        .modal-enter { animation: modalSlide 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes modalSlide {
            from { opacity: 0; transform: scale(0.95) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        #graphContainer { width: 100%; height: 100%; outline: none; }
        .landmark-badge {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            color: white;
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 2px 8px;
            border-radius: 999px;
        }
        .animate-fade-in {
            animation: fadeIn 0.35s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .source-viewer-overlay { background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(4px); }
        .pdf-iframe-container { width: 100%; height: 70vh; overflow: hidden; border-radius: 8px; }
        .text-viewer { font-family: 'Consolas', 'Monaco', 'Courier New', monospace; white-space: pre-wrap; line-height: 1.6; font-size: 14px; }
        .page-highlight { background: #fef3c7; border-left: 4px solid #f59e0b; padding-left: 12px; margin: 10px 0; }
        .lang-dropdown { position: relative; display: inline-block; }
        .lang-dropdown-content {
            display: none;
            position: absolute;
            right: 0;
            min-width: 160px;
            z-index: 50;
            background: linear-gradient(135deg, rgba(255,255,255,0.95) 0%, rgba(250,249,246,0.95) 100%);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1), 0 8px 16px rgba(0, 0, 0, 0.06), inset 0 1px 0 rgba(255, 255, 255, 0.9);
            overflow: hidden;
        }
        .lang-dropdown-content.show { display: block; }
        .lang-option {
            padding: 12px 18px;
            cursor: pointer;
            font-size: 14px;
            color: #475569;
            transition: all 0.2s ease;
        }
        .lang-option:hover { background: rgba(99, 102, 241, 0.08); color: #4f46e5; }
        .lang-option.active { font-weight: 500; color: #4f46e5; background: rgba(99, 102, 241, 0.08); }
    </style>
</head>
<body class="min-h-screen overflow-x-hidden selection:bg-green-200 selection:text-green-900">

    <!-- 导航栏 -->
    <nav class="glass-nav sticky top-0 z-50 h-16">
        <div class="max-w-6xl mx-auto px-6 h-full flex items-center justify-between">
            <div class="flex items-center gap-3 cursor-pointer spring-active" onclick="window.location.href='index.html'">
                <div id="navLogoContainer" class="h-12 md:h-10 rounded-none md:rounded-xl overflow-hidden flex-shrink-0 md:w-10 bg-white md:bg-transparent">
                    <img id="navLogo" src="resources/logo.png" alt="logo" class="h-full w-auto md:w-full md:h-full object-contain">
                </div>
                <span class="hidden md:inline font-bold text-lg tracking-tight text-slate-900" data-i18n="appName">知识导学</span>
            </div>
            <div class="flex items-center gap-3">
                <div class="flex items-center gap-1.5 px-3 py-1.5 rounded-xl bg-amber-50 border border-amber-200 text-amber-700 text-sm font-medium min-w-[3.5rem] justify-center">
                    <span>💎</span>
                    <span data-visitor-credits>--</span>
                </div>
                <button onclick="TutorApp.showUploadView()" id="newGraphBtn" class="hidden px-4 py-2 rounded-xl liquid-btn text-sm font-medium text-slate-700 spring-active">
                    <span data-i18n="newGraph">新建图谱</span>
                </button>
                <div class="lang-dropdown">
                    <button onclick="toggleLangDropdown()" class="p-2 rounded-xl liquid-btn text-sm font-medium text-slate-700 flex items-center">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"/>
                        </svg>
                        <span id="currentLangDisplay" class="hidden md:inline ml-1">简体中文</span>
                        <svg class="w-4 h-4 ml-1 hidden md:inline" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                        </svg>
                    </button>
                    <div id="langDropdown" class="lang-dropdown-content">
                        <div class="lang-option" onclick="changeLanguage('zh')" data-lang="zh">简体中文</div>
                        <div class="lang-option" onclick="changeLanguage('zh-TW')" data-lang="zh-TW">繁體中文</div>
                        <div class="lang-option" onclick="changeLanguage('en')" data-lang="en">English</div>
                        <div class="lang-option" onclick="changeLanguage('ko')" data-lang="ko">한국어</div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- 上传区域 -->
    <main id="uploadSection" class="max-w-5xl mx-auto px-6 py-10">
        <section class="glass-card squircle p-8 md:p-10 mb-8">
            <h1 class="text-2xl font-bold text-slate-900 mb-2 text-center" data-i18n="uploadTitle">上传学习资料</h1>
            <p class="text-slate-500 text-sm mb-6 text-center" data-i18n="supportFormats">支持 PDF、Word(DOCX)、PPT(PPTX)、TXT 格式</p>

            <!-- 桌面端上传区 -->
            <div id="dropZone" class="hidden sm:block drop-zone rounded-2xl p-10 text-center cursor-pointer mb-6">
                <div class="w-16 h-16 mx-auto mb-4 rounded-full bg-emerald-50 flex items-center justify-center">
                    <svg class="w-8 h-8 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
                    </svg>
                </div>
                <p class="text-slate-700 font-medium mb-1" data-i18n="dropText">拖拽 PDF 或文本文件到此处，或点击上传</p>
                <input type="file" id="fileInput" class="hidden" accept=".pdf,.docx,.pptx,.xlsx,.xls,.txt">
            </div>

            <!-- 移动端上传按钮 -->
            <div class="sm:hidden mb-6">
                <button onclick="document.getElementById('fileInput').click()" class="w-full py-3 px-4 rounded-xl liquid-btn-emerald text-white font-semibold flex items-center justify-center gap-2 spring-active">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
                    </svg>
                    <span data-i18n="uploadStudyMaterial">上传学习资料</span>
                </button>
            </div>

            <div id="fileList" class="hidden mb-6"></div>

            <!-- 高级设置 -->
            <div class="bg-slate-50/70 rounded-2xl p-5 border border-slate-200/60 mb-6 space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-2" data-i18n="language">输出语言</label>
                        <input type="hidden" id="tutorLangValue" value="en">
                        <div class="lang-dropdown" id="tutorLangDropdown">
                            <button type="button" onclick="toggleTutorLangDropdown()" class="px-3 py-2 rounded-xl liquid-btn text-sm font-medium text-slate-700 flex items-center w-full justify-between bg-white/80 border border-slate-200">
                                <span id="tutorLangDisplay">English</span>
                                <svg class="w-4 h-4 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                                </svg>
                            </button>
                            <div id="tutorLangOptions" class="lang-dropdown-content w-full">
                                <div class="lang-option" onclick="selectTutorLang('zh')" data-lang="zh">简体中文</div>
                                <div class="lang-option" onclick="selectTutorLang('zh-TW')" data-lang="zh-TW">繁體中文</div>
                                <div class="lang-option" onclick="selectTutorLang('en')" data-lang="en">English</div>
                                <div class="lang-option" onclick="selectTutorLang('ko')" data-lang="ko">한국어</div>
                            </div>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-2" data-i18n="generateMode">生成模式</label>
                        <input type="hidden" id="tutorModeValue" value="expert">
                        <div class="inline-flex p-1 rounded-xl bg-slate-100/80 border border-slate-200">
                            <button type="button" onclick="selectTutorMode('fast')" id="btnModeFast" class="px-4 py-1.5 rounded-lg text-sm font-medium text-slate-600 transition-all flex items-center gap-1.5">
                                <span>🚀</span>
                                <span data-i18n="modeFast">快速</span>
                            </button>
                            <button type="button" onclick="selectTutorMode('expert')" id="btnModeExpert" class="px-4 py-1.5 rounded-lg text-sm font-medium text-white bg-gradient-to-r from-emerald-400 to-green-500 shadow-sm transition-all flex items-center gap-1.5">
                                <span>🔍</span>
                                <span data-i18n="modeExpert">精研</span>
                            </button>
                        </div>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2" data-i18n="customPrompt">个性化要求</label>
                    <textarea id="customPrompt" rows="3" maxlength="100" class="w-full px-3 py-2 rounded-xl border border-slate-300 bg-white/80 text-sm text-slate-700 focus:outline-none focus:ring-2 focus:ring-emerald-500/40 focus:border-emerald-500 resize-none" data-i18n-placeholder="customPromptPlaceholder" placeholder="例如：请重点围绕第三章的内容构建图谱"></textarea>
                    <p class="text-xs text-slate-400 mt-1 text-right"><span id="customPromptCount">0</span>/100</p>
                </div>
            </div>

            <div class="mb-6 p-3 border border-slate-200 rounded-lg bg-slate-50">
                <p class="text-xs text-slate-500 mb-2 text-center" data-i18n="captchaLabel">人机验证</p>
                <div class="flex justify-center overflow-hidden">
                    <div style="transform: scale(0.9); transform-origin: center center; margin: 0 -15px;">
                        <div class="cf-turnstile" data-sitekey="0x4AAAAAACyCQq1B6IXFL27N"></div>
                    </div>
                </div>
            </div>

            <button id="startGenerateBtn" class="w-full py-3 rounded-xl liquid-btn-emerald text-white font-semibold spring-active" data-i18n="startGenerate">开始生成知识图谱</button>
            <div class="bg-amber-50 border border-amber-200 rounded-xl p-3 mt-4">
                <div class="flex items-center justify-center gap-2 text-amber-700">
                    <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                    <span class="text-xs md:text-sm font-medium" data-i18n="refreshWarning">⚠️ 生成过程中请勿关闭或刷新网页</span>
                </div>
            </div>
        </section>

        <!-- 最近图谱 -->
        <section class="glass-card squircle p-6 md:p-8">
            <h3 class="text-lg font-semibold mb-4 flex items-center text-slate-900">
                <svg class="w-5 h-5 mr-2 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
                <span data-i18n="myGraphs">我的知识图谱</span>
            </h3>
            <div id="recentGraphs" class="space-y-3">
                <div class="text-slate-400 text-center py-4 text-sm" data-i18n="noRecent">暂无知识图谱</div>
            </div>
        </section>
    </main>

    <!-- 生成进度弹窗 -->
    <div id="genProgress" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/30 backdrop-blur-sm">
        <div class="glass-card squircle w-full max-w-md mx-4 p-6 md:p-8 modal-enter">
            <h3 class="text-lg font-bold text-slate-900 mb-6" data-i18n="generating">正在生成知识图谱...</h3>
            <div class="space-y-4 mb-6">
                <div id="step0" class="step-item text-slate-400">
                    <div class="step-number">1</div>
                    <span data-i18n="fileProcessing">处理文件</span>
                </div>
                <div id="step1" class="step-item text-slate-400">
                    <div class="step-number">2</div>
                    <span data-i18n="skeletonStep">构建知识骨架</span>
                </div>
                <div id="step2" class="step-item text-slate-400">
                    <div class="step-number">3</div>
                    <span id="progressText" data-i18n="nodeStep">填充节点内容</span>
                </div>
            </div>
            <div class="h-2 bg-slate-100 rounded-full overflow-hidden mb-4">
                <div id="progressBar" class="h-full bg-gradient-to-r from-indigo-500 to-emerald-400 transition-all duration-300" style="width: 5%"></div>
            </div>
            <!-- 实时生成进度缩略图谱 -->
            <div id="genSkeletonPreview" class="hidden rounded-xl bg-white/60 border border-white/60 overflow-hidden" style="height: 180px;">
                <div id="genSkeletonContainer" class="w-full h-full"></div>
            </div>
            <div class="bg-red-50 border-2 border-red-400 rounded-xl p-3 md:p-4 mt-4 md:mt-6">
                <div class="flex items-center justify-center gap-2 text-red-700">
                    <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                    </svg>
                    <span class="text-sm md:text-base font-bold" data-i18n="refreshWarning">⚠️ 生成过程中请勿关闭或刷新网页</span>
                </div>
            </div>
        </div>
    </div>

    <!-- 图谱学习区域 -->
    <main id="graphSection" class="hidden max-w-6xl mx-auto px-4 py-6 h-[calc(100vh-80px)]">
        <div class="glass-card squircle p-4 flex flex-col h-full min-h-[400px]">
            <div class="flex items-center justify-between mb-3">
                <h2 class="text-lg font-bold text-slate-900" data-i18n="graphTitle">知识图谱</h2>
                <div class="flex items-center gap-3">
                    <div class="flex items-center gap-3 text-xs">
                        <div class="flex items-center gap-1"><span class="w-3 h-3 rounded-full bg-gray-400"></span><span class="text-slate-500">未解锁</span></div>
                        <div class="flex items-center gap-1"><span class="w-3 h-3 rounded-full bg-blue-500"></span><span class="text-slate-500">可学习</span></div>
                        <div class="flex items-center gap-1"><span class="w-3 h-3 rounded-full bg-green-500"></span><span class="text-slate-500">已完成</span></div>
                    </div>
                    <button onclick="TutorApp.showUploadView()" class="ml-2 p-1.5 rounded-lg liquid-btn text-slate-500 hover:text-slate-700 spring-active" title="关闭图谱">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </div>
            </div>
            <div class="flex-1 rounded-xl bg-white/50 border border-white/60 overflow-hidden relative">
                <div id="graphContainer" class="absolute inset-0"></div>
            </div>
        </div>
    </main>

    <!-- 节点学习弹窗 -->
    <div id="nodeLearnModal" class="hidden fixed inset-0 z-50 bg-black/40 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="glass-card squircle w-full max-w-4xl h-[85vh] flex flex-col modal-enter overflow-hidden">
            <!-- 弹窗头部 -->
            <div class="flex items-center justify-between px-6 py-4 border-b border-slate-200/60">
                <div>
                    <h2 id="learnModalTitle" class="text-xl font-bold text-slate-900">节点名称</h2>
                    <div class="flex items-center gap-2 mt-1">
                        <span id="landmarkBadgeModal" class="landmark-badge hidden">Milestone</span>
                        <span id="stepIndicator" class="text-xs text-slate-500 font-medium"></span>
                    </div>
                </div>
                <button id="closeLearnModal" class="w-10 h-10 rounded-full liquid-btn flex items-center justify-center text-slate-500 hover:text-slate-700 spring-active">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
            <!-- 步骤进度条 -->
            <div class="px-6 pt-4">
                <div class="h-1.5 bg-slate-100 rounded-full overflow-hidden">
                    <div id="learnModalProgress" class="h-full bg-indigo-500 transition-all duration-300" style="width: 0%"></div>
                </div>
            </div>
            <!-- 内容区 -->
            <div id="learnModalContent" class="flex-1 overflow-y-auto px-6 py-6 relative">
                <!-- 动态渲染步骤内容 -->
            </div>
            <!-- 底部导航 -->
            <div class="px-6 py-4 border-t border-slate-200/60 bg-white/40 flex items-center justify-between">
                <button id="prevStepBtn" class="px-5 py-2.5 rounded-xl liquid-btn text-sm font-medium text-slate-700 spring-active hidden">上一步</button>
                <div class="flex-1"></div>
                <button id="nextStepBtn" class="px-6 py-2.5 rounded-xl text-sm font-medium liquid-btn-emerald text-white spring-active">下一步</button>
                <button id="completeNodeBtn" class="hidden px-6 py-2.5 rounded-xl text-sm font-medium liquid-btn-emerald text-white spring-active">标记完成</button>
            </div>
        </div>
    </div>

    <!-- Source File Viewer Modal -->
    <div id="sourceViewerModal" class="hidden fixed inset-0 source-viewer-overlay z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl max-w-[95vw] w-full max-h-[95vh] flex flex-col shadow-2xl modal-enter">
            <div class="p-4 border-b border-slate-200 flex justify-between items-center bg-slate-50 rounded-t-2xl">
                <div class="flex items-center space-x-3">
                    <h3 class="font-bold text-slate-900" id="viewerTitle">原始文件</h3>
                    <span id="viewerLocation" class="text-sm text-slate-500 bg-white px-3 py-1 rounded-full border border-slate-200"></span>
                </div>
                <div class="flex items-center space-x-2">
                    <button onclick="window.fileViewer.download()" class="p-2 hover:bg-slate-200 rounded-lg text-slate-600 transition-colors" title="下载文件">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4-4m0 0l-4 4m4-4v12"/></svg>
                    </button>
                    <button onclick="window.fileViewer.close()" class="p-2 hover:bg-slate-200 rounded-lg text-slate-600 transition-colors">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                    </button>
                </div>
            </div>
            <div class="flex-1 overflow-y-auto p-6 bg-slate-100" id="viewerContent"></div>
            <div class="p-4 border-t border-slate-200 bg-slate-50 rounded-b-2xl flex justify-between items-center">
                <span class="text-sm text-slate-500" id="viewerFileInfo"></span>
                <div class="flex space-x-2" id="viewerControls"></div>
            </div>
        </div>
    </div>

    <script src="js/visitor.js"></script>
    <script src="js/tutor-db.js"></script>
    <script src="js/tutor-graph.js"></script>
    <script src="js/tutor-panel.js"></script>
    <script src="js/tutor-sse.js"></script>
    <script src="js/tutor-main.js"></script>
</body>
</html>
