<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录中...</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #faf9f6;
            color: #475569;
        }
        .box {
            text-align: center;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #e2e8f0;
            border-top-color: #10b981;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="spinner"></div>
        <div>登录处理中，请稍候...</div>
    </div>
    <script>
        (async () => {
            const API_BASE = 'https://moyuxiaowu.org';

            const url = new URL(window.location.href);
            const code = url.searchParams.get('code');
            const state = url.searchParams.get('state');
            const error = url.searchParams.get('error');

            const storedState = sessionStorage.getItem('oauth_state');
            const visitorId = sessionStorage.getItem('oauth_visitor') || '';
            const inviteCode = sessionStorage.getItem('oauth_invite') || '';

            // 清理 sessionStorage
            sessionStorage.removeItem('oauth_state');
            sessionStorage.removeItem('oauth_visitor');
            sessionStorage.removeItem('oauth_invite');

            if (error || !code) {
                alert('登录失败或已取消');
                window.location.href = '/index.html';
                return;
            }

            if (state !== storedState) {
                alert('登录验证失败，请重试');
                window.location.href = '/index.html';
                return;
            }

            try {
                const res = await fetch(`${API_BASE}/auth/google/exchange`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        code,
                        state,
                        redirectUri: window.location.origin + '/oauth-callback.html',
                        visitorId,
                        inviteCode
                    })
                });

                const data = await res.json();

                if (data.token) {
                    localStorage.setItem('token', data.token);
                    const params = new URLSearchParams();
                    params.set('login', 'success');
                    params.set('merged', data.mergedAmount || 0);
                    if (data.inviteBonus) {
                        params.set('inviteBonus', data.inviteBonus);
                        params.set('inviterName', data.inviterName || '');
                    }
                    window.location.href = '/index.html?' + params.toString();
                } else {
                    alert(data.error || '登录失败');
                    window.location.href = '/index.html';
                }
            } catch (err) {
                alert('登录请求失败，请重试');
                window.location.href = '/index.html';
            }
        })();
    </script>
</body>
</html>
