<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>从资料生成 - GPA4.0</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/dexie@3.2.4/dist/dexie.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', 'Noto Sans SC', 'Noto Sans TC', 'Noto Sans KR', sans-serif;
        }
        
        .glass-effect {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
        
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .slide-in {
            animation: slideIn 0.3s ease-out;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .pulse-ring {
            animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }
        
        @keyframes pulse-ring {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(99, 102, 241, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(99, 102, 241, 0); }
        }
        
        .drop-zone {
            border: 2px dashed #cbd5e1;
            transition: all 0.3s ease;
        }
        
        .drop-zone.dragover {
            border-color: #6366f1;
            background-color: #eef2ff;
            transform: scale(1.02);
        }
        
        .btn-pulse-glow {
            animation: pulse-glow 2s infinite;
        }

        @keyframes pulse-glow {
            0%, 100% { 
                box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.7);
                transform: scale(1);
            }
            50% { 
                box-shadow: 0 0 20px 10px rgba(99, 102, 241, 0.3);
                transform: scale(1.02);
            }
        }

        .warning-banner {
            background: linear-gradient(90deg, #fee2e2 0%, #fecaca 100%);
            border: 2px solid #ef4444;
            color: #dc2626;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-weight: 600;
            text-align: center;
            animation: pulse-warning 2s infinite;
        }

        @keyframes pulse-warning {
            0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            50% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
        }

        .time-estimate {
            color: #6366f1;
            font-weight: 600;
        }

        .lang-dropdown {
            position: relative;
            display: inline-block;
        }

        .lang-dropdown-content {
            display: none;
            position: absolute;
            right: 0;
            background-color: white;
            min-width: 140px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            z-index: 50;
            border: 1px solid #e2e8f0;
        }

        .lang-dropdown-content.show {
            display: block;
        }

        .lang-option {
            padding: 10px 16px;
            cursor: pointer;
            font-size: 14px;
            color: #475569;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .lang-option:hover {
            background-color: #f1f5f9;
            color: #6366f1;
        }

        .lang-option.active {
            background-color: #eef2ff;
            color: #6366f1;
            font-weight: 500;
        }

        .lang-option.active::after {
            content: '✓';
            margin-left: 8px;
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
    </style>
<base target="_blank">
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">

    <nav class="glass-effect sticky top-0 z-50 border-b border-slate-200 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center space-x-3 cursor-pointer" onclick="window.location.href='index.html'">
                    <div class="w-10 h-10 gradient-bg rounded-xl flex items-center justify-center text-white font-bold text-xl shadow-lg">
                        E
                    </div>
                    <span class="font-bold text-xl bg-clip-text text-transparent bg-gradient-to-r from-indigo-600 to-purple-600" data-i18n="appName">
                        刷题考试助手
                    </span>
                </div>
                
                <div class="flex items-center space-x-4">
                    <div class="lang-dropdown">
                        <button onclick="toggleLangDropdown()" class="p-2 rounded-lg hover:bg-slate-100 transition-colors text-sm font-medium text-slate-600 flex items-center">
                            <svg class="w-5 h-5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M11 21l5-10 5 10M12.751 5C11.783 10.77 8.07 15.61 3 18.129"/>
                            </svg>
                            <span id="currentLangDisplay">简体中文</span>
                        </button>
                        <div id="langDropdown" class="lang-dropdown-content">
                            <div class="lang-option" onclick="changeLanguage('zh')" data-lang="zh">简体中文</div>
                            <div class="lang-option" onclick="changeLanguage('zh-TW')" data-lang="zh-TW">繁體中文</div>
                            <div class="lang-option" onclick="changeLanguage('en')" data-lang="en">English</div>
                            <div class="lang-option" onclick="changeLanguage('ko')" data-lang="ko">한국어</div>
                        </div>
                    </div>
                    <a href="index.html" class="p-2 rounded-lg hover:bg-slate-100 transition-colors text-slate-600 flex items-center">
                        <svg class="w-5 h-5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                        </svg>
                        <span data-i18n="back">返回</span>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="mb-6 flex items-center justify-between">
            <h2 class="text-2xl font-bold text-slate-900" data-i18n="generateHeader">从资料生成题库</h2>
        </div>

        <div class="grid lg:grid-cols-2 gap-8">
            <div class="space-y-6">
                <!-- 修改 accept 属性，添加 .xls 支持 -->
                <div id="dropZone" class="drop-zone rounded-2xl p-8 text-center bg-white border-2 border-dashed border-slate-300 hover:border-indigo-400 transition-all cursor-pointer">
                    <input type="file" id="fileInput" class="hidden" accept=".pdf,.docx,.pptx,.xlsx,.xls,.txt" multiple>
                    <div class="mb-4">
                        <svg class="w-16 h-16 mx-auto text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
                        </svg>
                    </div>
                    <p class="text-lg font-medium text-slate-700 mb-2" data-i18n="dropText">拖拽文件到此处，或点击上传</p>
                    <!-- 更新提示文本，包含 xls -->
                    <p class="text-sm text-slate-500" data-i18n="supportFormats">支持 PDF、Word(DOCX)、PPT(PPTX)、Excel(XLSX/XLS)、TXT</p>
                    <div id="fileList" class="mt-4 space-y-2 text-left hidden"></div>
                </div>

                <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 space-y-4">
                    <h3 class="font-semibold text-slate-900" data-i18n="configTitle">生成配置</h3>
                    
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-2" data-i18n="questionCount">题目数量（20的倍数）</label>
                        <select id="questionCount" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all">
                            <option value="20">20</option>
                            <option value="40">40</option>
                            <option value="60">60</option>
                            <option value="80">80</option>
                            <option value="100" selected>100</option>
                            <option value="120">120</option>
                            <option value="140">140</option>
                            <option value="160">160</option>
                            <option value="180">180</option>
                            <option value="200">200</option>
                        </select>
                        <p class="text-xs text-slate-500 mt-1" data-i18n="chunkHint">每20道题对应一个文本分段</p>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-2" data-i18n="language">生成语言</label>
                        <div class="flex space-x-4">
                            <label class="flex items-center cursor-pointer">
                                <input type="radio" name="genLang" value="zh" checked class="w-4 h-4 text-indigo-600 border-slate-300 focus:ring-indigo-500">
                                <span class="ml-2 text-slate-700" data-i18n="langZH">中文</span>
                            </label>
                            <label class="flex items-center cursor-pointer">
                                <input type="radio" name="genLang" value="en" class="w-4 h-4 text-indigo-600 border-slate-300 focus:ring-indigo-500">
                                <span class="ml-2 text-slate-700" data-i18n="langEN">English</span>
                            </label>
                        </div>
                    </div>

                    <button onclick="startGeneration()" id="genBtn" class="w-full gradient-bg text-white font-semibold py-3 rounded-lg hover:opacity-90 transition-opacity flex items-center justify-center disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                        <span data-i18n="startGenerate">开始生成</span>
                        <svg class="w-5 h-5 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                        </svg>
                    </button>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 h-[600px] flex flex-col">
                <h3 class="font-semibold text-slate-900 mb-4 flex items-center justify-between">
                    <span data-i18n="extractedText">提取的文本内容</span>
                    <span id="textStats" class="text-xs text-slate-500 font-normal"></span>
                </h3>
                <div id="textPreview" class="flex-1 bg-slate-50 rounded-lg p-4 overflow-y-auto text-sm text-slate-600 font-mono whitespace-pre-wrap border border-slate-200">
                    <span class="text-slate-400 italic" data-i18n="waitingUpload">等待上传文件...</span>
                </div>
            </div>
        </div>
    </main>

    <!-- 进度弹窗 -->
    <div id="genProgress" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center">
        <div class="bg-white rounded-2xl p-8 max-w-md w-full mx-4 shadow-2xl">
            <div class="text-center mb-6">
                <div class="w-16 h-16 gradient-bg rounded-full flex items-center justify-center mx-auto mb-4 pulse-ring">
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                    </svg>
                </div>
                <h3 class="text-xl font-bold text-slate-900 mb-2" data-i18n="generating">正在生成题库...</h3>
                <p class="text-slate-500 text-sm loading-dots" data-i18n="aiProcessing">AI正在处理内容</p>
            </div>
            
            <div class="warning-banner" data-i18n="warningRefresh">
                ⚠️ 生成过程中请勿关闭或刷新网页，否则会导致生成失败
            </div>
            
            <div class="text-center mb-4">
                <span class="time-estimate" id="timeEstimate" data-i18n="estimatedTime">预计需要等待 600 秒</span>
            </div>
            
            <div class="progress-info">
                <span data-i18n="progress">进度</span>
                <span id="questionProgressText" data-i18n="generatedCount">已生成 0 题，共 100 题</span>
            </div>
            
            <div class="w-full bg-slate-200 rounded-full h-3 mb-4">
                <div id="progressBar" class="gradient-bg h-3 rounded-full transition-all duration-300" style="width: 0%"></div>
            </div>

            <div id="statusText" class="text-center text-sm text-slate-500 mt-4 font-mono" data-i18n="preparing">
                准备中...
            </div>
            
            <!-- 捐款提示 -->
            <div class="mt-6 pt-4 border-t border-slate-200">
                <p class="text-xs text-slate-500 text-center mb-3" data-i18n="donateHint">
                    生成一次题库成本约为1元，如果你觉得好用，可以捐款支持本网站
                </p>
                <a href="https://donate.example.com" target="_blank" class="flex items-center justify-center w-full py-2 bg-gradient-to-r from-amber-400 to-orange-500 text-white rounded-lg hover:from-amber-500 hover:to-orange-600 transition-all text-sm font-medium shadow-md hover:shadow-lg transform hover:-translate-y-0.5" data-i18n="donateButton">
                    ❤️ 支持开发者
                </a>
            </div>
        </div>
    </div>

    <!-- 结果模态框 -->
    <div id="resultModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl max-w-4xl w-full max-h-[90vh] flex flex-col shadow-2xl">
            <div class="p-6 border-b border-slate-200">
                <h3 class="text-xl font-bold text-slate-900" data-i18n="previewResult">预览生成结果</h3>
            </div>
            
            <div class="flex-1 overflow-y-auto p-6">
                <div id="resultPreview" class="space-y-4"></div>
            </div>

            <div class="p-6 border-t border-slate-200 bg-slate-50 rounded-b-2xl flex justify-end space-x-3">
                <button onclick="discardResult()" class="px-4 py-2 text-slate-400 hover:text-slate-600 transition-colors text-sm" data-i18n="discardBank">
                    放弃此题库
                </button>
                <button onclick="saveAndPractice()" class="px-6 py-2 gradient-bg text-white rounded-lg hover:opacity-90 transition-opacity flex items-center btn-pulse-glow font-semibold">
                    <span data-i18n="saveAndPractice">保存并练习</span>
                    <svg class="w-5 h-5 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-4 right-4 transform translate-y-20 opacity-0 transition-all duration-300 z-50">
        <div class="bg-slate-800 text-white px-6 py-3 rounded-lg shadow-lg flex items-center">
            <svg id="toastIcon" class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
            </svg>
            <span id="toastMessage">操作成功</span>
        </div>
    </div>

            questionBanks: '++id, name, createdAt, updatedAt',

        function enableRefreshProtection() {
            preventRefresh = true;
            window.addEventListener('beforeunload', handleBeforeUnload);

            preventRefresh = false;
            window.removeEventListener('beforeunload', handleBeforeUnload);

        function t(key, ...args) {
            let text = i18n[currentLang][key] || key;
            if (args.length > 0) {
                args.forEach((arg, index) => {
                    text = text.replace(`{${index}}`, arg);
                });
            }
            return text;
        }

        function detectBrowserLanguage() {
            const browserLang = navigator.language || navigator.userLanguage || 'en';
            const lang = browserLang.toLowerCase();
            if (lang.startsWith('zh') && (lang.includes('cn') || lang.includes('sg') || lang.includes('hans') || lang === 'zh')) return 'zh';
            if (lang.startsWith('zh') && (lang.includes('tw') || lang.includes('hk') || lang.includes('mo') || lang.includes('hant'))) return 'zh-TW';
            if (lang.startsWith('ko')) return 'ko';
            if (lang.startsWith('en')) return 'en';
            return 'en';
        }

        function updateLanguage() {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (i18n[currentLang] && i18n[currentLang][key]) {
                    el.textContent = i18n[currentLang][key];
                }
            });
            document.getElementById('currentLangDisplay').textContent = 
                currentLang === 'zh' ? '简体中文' : 
                currentLang === 'zh-TW' ? '繁體中文' : 
                currentLang === 'ko' ? '한국어' : 'English';
        }

        function setupDropZone() {
            const dropZone = document.getElementById('dropZone');
            const input = document.getElementById('fileInput');
            
            dropZone.addEventListener('click', () => input.click());
            
            dropZone.addEventListener('dragover', (e) => {
                e.preventDefault();
                dropZone.classList.add('dragover');
            });
            
            dropZone.addEventListener('dragleave', () => {
                dropZone.classList.remove('dragover');
            });
            
            dropZone.addEventListener('drop', (e) => {
                e.preventDefault();
                dropZone.classList.remove('dragover');
                handleFiles(e.dataTransfer.files);
            });
            
            input.addEventListener('change', (e) => {
                handleFiles(e.target.files);
            });
        }

        // 检查旧版 Office 格式（移除了对 xls 的限制）
        function checkOldFormat(filename) {
            const ext = filename.split('.').pop().toLowerCase();
            const formatMap = {
                'doc': 'oldFormatDoc',
                'ppt': 'oldFormatPpt'
                // 移除 'xls': 'oldFormatXls'，允许旧版 Excel 格式
            };
            return formatMap[ext] || null;
        }

        // 检查文件类型分类（添加 xls 支持）
        function getFileCategory(ext) {
            if (['pdf', 'pptx'].includes(ext)) return 'page-based';
            if (['xlsx', 'xls'].includes(ext)) return 'row-based'; // 添加 xls 支持
            if (['docx', 'txt'].includes(ext)) return 'text-based';
            return 'unknown';
        }

        async function cacheFiles(files) {
            for (const file of files) {
                try {
                    const arrayBuffer = await file.arrayBuffer();
                    await db.sourceFiles.where('name').equals(file.name).delete();
                    
                    await db.sourceFiles.add({
                        name: file.name,
                        bankId: null,
                        data: arrayBuffer,
                        type: file.type,
                        createdAt: new Date().toISOString()
                    });
                } catch (err) {
                    console.error('Failed to cache file:', file.name, err);
                }
            }
        }

        async function handleFiles(files) {
            currentFiles = Array.from(files);
            
            // 检查混合类型
            const categories = new Set(currentFiles.map(f => getFileCategory(f.name.split('.').pop().toLowerCase())));
            if (categories.size > 1) {
                alert(t('mixedFileTypes'));
                document.getElementById('fileInput').value = '';
                currentFiles = [];
                return;
            }
            
            if (currentFiles.length > 0) {
                currentFileType = currentFiles[0].name.split('.').pop().toLowerCase();
            }
            
            // 检查旧版格式（不再拦截 xls）
            for (const file of currentFiles) {
                const formatKey = checkOldFormat(file.name);
                if (formatKey) {
                    alert(t(formatKey));
                    document.getElementById('fileInput').value = '';
                    return;
                }
            }
            
            const fileList = document.getElementById('fileList');
            
            fileList.innerHTML = '';
            fileList.classList.remove('hidden');
            
            currentFiles.forEach((file, index) => {
                const div = document.createElement('div');
                div.className = 'flex items-center justify-between bg-slate-50 p-3 rounded-lg border border-slate-200';
                div.innerHTML = `

                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">

            try {
                await cacheFiles(currentFiles);

                }

        async function removeFile(index) {
            const removedFile = currentFiles[index];
            currentFiles.splice(index, 1);
            
            if (removedFile) {
                try {
                    await db.sourceFiles.where('name').equals(removedFile.name).delete();
                } catch (err) {
                    console.error('Failed to remove cached file:', err);
                }
            }
            
            if (currentFiles.length === 0) {
                document.getElementById('fileList').classList.add('hidden');
                document.getElementById('textPreview').innerHTML = `<span class="text-slate-400 italic">${t('waitingUpload')}</span>`;
                extractedText = '';

                document.getElementById('genBtn').disabled = true;

        async function extractText() {
            const preview = document.getElementById('textPreview');
            preview.innerHTML = '<div class="flex items-center justify-center h-full"><div class="animate-spin rounded-full h-8 w-8 border-b-2 border-indigo-600"></div></div>';
            
            let fullText = '';
            
            for (const file of currentFiles) {
                const ext = file.name.split('.').pop().toLowerCase();
                try {
                    if (ext === 'pdf') {
                        fullText += await extractPDF(file) + '\n\n';
                    } else if (ext === 'docx') {
                        fullText += await extractWord(file) + '\n\n';
                    } else if (ext === 'xlsx' || ext === 'xls') {
                        // 支持 xls 和 xlsx
                        fullText += await extractExcel(file) + '\n\n';
                    } else if (ext === 'pptx') {
                        fullText += await extractPPT(file) + '\n\n';
                    } else if (ext === 'txt') {
                        const content = await file.text();
                        fullText += `-------------【${file.name}】-----------\n${content}\n\n`;
                    }
                } catch (err) {
                    console.error('Extraction error:', err);
                    fullText += `[Error extracting ${file.name}: ${err.message}]\n\n`;
                }
            }
            
            extractedText = fullText.trim();
            preview.textContent = extractedText.substring(0, 5000) + (extractedText.length > 5000 ? '\n\n... (truncated)' : '');
            
            document.getElementById('textStats').textContent = `${extractedText.length} chars | ${extractedText.split(/\s+/).length} words`;
        }

        async function extractPDF(file) {
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            let text = '';
            
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const content = await page.getTextContent();
                const pageText = content.items.map(item => item.str).join(' ');
                text += `-------------【${file.name}_page${i}】-----------\n${pageText}\n\n`;
            }
            return text;
        }

        async function extractWord(file) {
            const arrayBuffer = await file.arrayBuffer();
            const result = await mammoth.extractRawText({ arrayBuffer });
            const paragraphs = result.value.split(/\n\s*\n/);
            let text = `-------------【${file.name}】-----------\n`;
            
            paragraphs.forEach((para, idx) => {
                if (idx > 0 && idx % 5 === 0) {
                    text += `-------------【${file.name}_section${Math.floor(idx/5)+1}】-----------\n`;
                }
                text += para + '\n\n';
            });
            return text;
        }

        async function extractExcel(file) {
            const arrayBuffer = await file.arrayBuffer();
            const workbook = XLSX.read(arrayBuffer, { type: 'array' });
            let text = '';
            let globalRowIndex = 0;
            
            workbook.SheetNames.forEach((sheetName) => {
                const sheet = workbook.Sheets[sheetName];
                const data = XLSX.utils.sheet_to_json(sheet, { header: 1 });
                text += `-------------【${file.name}_${sheetName}_start】-----------\n`;
                
                data.forEach((row) => {
                    globalRowIndex++;
                    text += `-------------【${file.name}_${sheetName}_row${globalRowIndex}】-----------\n`;
                    text += row.join('\t') + '\n';
                });
                
                text += '\n';
            });
            return text;
        }

        async function extractPPT(file) {
            const arrayBuffer = await file.arrayBuffer();
            const zip = await JSZip.loadAsync(arrayBuffer);
            let text = '';
            
            const slideFiles = Object.keys(zip.files)
                .filter(name => name.startsWith('ppt/slides/slide') && name.endsWith('.xml'))
                .sort((a, b) => {
                    const numA = parseInt(a.match(/slide(\d+)\.xml$/)?.[1] || '0');
                    const numB = parseInt(b.match(/slide(\d+)\.xml$/)?.[1] || '0');
                    return numA - numB;
                });
            
            for (let i = 0; i < slideFiles.length; i++) {
                const slideFile = slideFiles[i];
                const content = await zip.files[slideFile].async('text');
                const matches = content.match(/<a:t>([^<]*)<\/a:t>/g);
                
                text += `-------------【${file.name}_slide${i+1}】-----------\n`;
                if (matches) {
                    text += matches.map(m => m.replace(/<\/?a:t>/g, '')).join(' ') + '\n';
                } else {
                    text += 'no text in this slide\n';
                }
                text += '\n';
            }
            return text || `[PPT text extraction limited. Please convert to PDF for better results.]`;
        }

        async function callLLM(messages) {
            const response = await fetch(`${API_BASE}/chat`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ messages: messages })
            });

            if (!response.ok) {
                throw new Error(`Backend request failed: ${response.status}`);
            }

            const data = await response.json();
            if (data.error) throw new Error(data.error);
            return data.choices?.[0]?.message?.content || '';
        }

        function splitByPages(text, numGroups) {
            const pageRegex = /-------------【.*?_(?:page|slide)(\d+)】-----------/g;
            const matches = [...text.matchAll(pageRegex)];
            
            if (matches.length === 0) {
                return overlapSplit(text, numGroups);
            }
            
            const totalPages = matches.length;
            const basePagesPerGroup = Math.floor(totalPages / numGroups);
            const extraPages = totalPages % numGroups;
            
            const groups = [];
            let currentMatchIndex = 0;
            
            for (let i = 0; i < numGroups; i++) {
                const pagesInThisGroup = basePagesPerGroup + (i === numGroups - 1 ? extraPages : 0);
                
                if (pagesInThisGroup === 0 || currentMatchIndex >= matches.length) {
                    continue;
                }
                
                const startMatch = matches[currentMatchIndex];
                const startIndex = startMatch.index;
                
                let endIndex;
                if (i === numGroups - 1) {
                    endIndex = text.length;
                } else {
                    const endMatchIndex = currentMatchIndex + pagesInThisGroup;
                    if (endMatchIndex < matches.length) {
                        endIndex = matches[endMatchIndex].index;
                    } else {
                        endIndex = text.length;
                    }
                }
                
                groups.push(text.substring(startIndex, endIndex));
                currentMatchIndex += pagesInThisGroup;
            }
            
            while (groups.length < numGroups) {
                groups.push('');
            }
            
            return groups;
        }

        function splitByRows(text, numGroups) {
            const rowRegex = /-------------【.*?_row(\d+)】-----------/g;
            const matches = [...text.matchAll(rowRegex)];
            
            if (matches.length === 0) {
                return overlapSplit(text, numGroups);
            }
            
            const totalRows = matches.length;
            const baseRowsPerGroup = Math.floor(totalRows / numGroups);
            const extraRows = totalRows % numGroups;
            
            const groups = [];
            let currentMatchIndex = 0;
            
            for (let i = 0; i < numGroups; i++) {
                const rowsInThisGroup = baseRowsPerGroup + (i === numGroups - 1 ? extraRows : 0);
                
                if (rowsInThisGroup === 0 || currentMatchIndex >= matches.length) {
                    continue;
                }
                
                const startMatch = matches[currentMatchIndex];
                const startIndex = startMatch.index;
                
                let endIndex;
                if (i === numGroups - 1) {
                    endIndex = text.length;
                } else {
                    const endMatchIndex = currentMatchIndex + rowsInThisGroup;
                    if (endMatchIndex < matches.length) {
                        endIndex = matches[endMatchIndex].index;
                    } else {
                        endIndex = text.length;
                    }
                }
                
                groups.push(text.substring(startIndex, endIndex));
                currentMatchIndex += rowsInThisGroup;
            }
            
            while (groups.length < numGroups) {
                groups.push('');
            }
            
            return groups;
        }

        function overlapSplit(text, numChunks, overlapChars = 500) {
            const chunks = [];
            if (numChunks > 1) {
                const baseChunkSize = Math.ceil(text.length / numChunks);
                for (let i = 0; i < numChunks; i++) {
                    const start = Math.max(0, i * baseChunkSize - overlapChars);
                    const end = Math.min(text.length, (i + 1) * baseChunkSize + overlapChars);
                    const adjustedStart = findParagraphStart(text, start);
                    const adjustedEnd = findParagraphEnd(text, end);
                    chunks.push(text.substring(adjustedStart, adjustedEnd));
                }
            } else {
                chunks.push(text);
            }
            return chunks;
        }

        function findParagraphStart(text, pos) {
            const prevNewline = text.lastIndexOf('\n\n', pos);
            return prevNewline === -1 ? 0 : prevNewline + 2;
        }

        function findParagraphEnd(text, pos) {
            const nextNewline = text.indexOf('\n\n', pos);
            return nextNewline === -1 ? text.length : nextNewline;
        }

        function getGeneratePrompt(text, count, startId, lang, chunkIndex, totalChunks) {
            const langInstruction = lang === 'zh' ? '使用中文' : 'Use English';
            
            return `You are an expert exam question creator. Create exactly ${count} multiple-choice questions based on the study material below.

CRITICAL REQUIREMENTS:
1. ${langInstruction} ONLY
2. Each question MUST have exactly 4 options: A, B, C, D
3. Include explanation for each correct answer
4. Return ONLY a JSON array. No markdown, no code blocks, no explanations before or after.
5. The response must start with [ and end with ]
6. CRITICAL: For the "source" field, you MUST use the EXACT page marker format shown in the text (e.g., "-------------【filename_page1】-----------" or "-------------【filename_section1】-----------")

Required JSON format:
[
  {
    "id": ${startId},
    "question": "question text here",
    "options": {
      "A": "first option",
      "B": "second option", 
      "C": "third option",
      "D": "fourth option"
    },
    "correctAnswer": "A",
    "explanation": "explanation text",
    "source": "EXACT page marker from text, e.g., -------------【filename_page3】-----------"
  }
]

Study Material (Part ${chunkIndex + 1} of ${totalChunks}):
${text.substring(0, 15000)}

Generate exactly ${count} questions. Use the page markers in the text to indicate source location. Output valid JSON only.`;
        }

        function extractJSON(text) {
            let jsonStr = text.trim();
            jsonStr = jsonStr.replace(/```json\s*/gi, '');
            jsonStr = jsonStr.replace(/```\s*/g, '');
            
            const startIdx = jsonStr.indexOf('[');
            const endIdx = jsonStr.lastIndexOf(']');
            
            if (startIdx === -1 || endIdx === -1 || startIdx >= endIdx) {
                throw new Error('No JSON array found in response');
            }
            
            jsonStr = jsonStr.substring(startIdx, endIdx + 1);
            
            try {
                return JSON.parse(jsonStr);
            } catch (e) {
                let repaired = jsonStr;
                repaired = repaired.replace(/,\s*]/g, ']');
                repaired = repaired.replace(/,\s*}/g, '}');
                repaired = repaired.replace(/'/g, '"');
                repaired = repaired.replace(/\n/g, ' ');
                
                try {
                    return JSON.parse(repaired);
                } catch (e2) {
                    throw new Error('Invalid JSON format after repair attempts');
                }
            }
        }

        async function startGeneration() {
            if (!extractedText) {
                showToast(t('fillRequired'), 'error');
                return;
            }

            enableRefreshProtection();
            
            const totalCount = parseInt(document.getElementById('questionCount').value) || 20;
            const lang = document.querySelector('input[name="genLang"]:checked').value;
            const numGroups = totalCount / 20;
            
            document.getElementById('genProgress').classList.remove('hidden');
            
            const totalSeconds = 80 + 5 * numGroups;
            let elapsedSeconds = 0;
            
            document.getElementById('timeEstimate').textContent = t('estimatedTime', totalSeconds);
            document.getElementById('questionProgressText').textContent = t('generatedCount', 0, totalCount);
            document.getElementById('progressBar').style.width = '0%';
            document.getElementById('statusText').textContent = t('preparing');
            
            progressInterval = setInterval(() => {
                elapsedSeconds++;
                const remainingSeconds = totalSeconds - elapsedSeconds;
                const rawProgress = (elapsedSeconds / totalSeconds) * 100;
                const progressPercent = Math.min(rawProgress, 95);
                document.getElementById('progressBar').style.width = progressPercent + '%';
                document.getElementById('timeEstimate').textContent = remainingSeconds > 0 ? t('estimatedTime', remainingSeconds) : t('almostDone');
                const simulatedQuestionCount = Math.min(Math.floor((elapsedSeconds / totalSeconds) * totalCount), totalCount);
                document.getElementById('questionProgressText').textContent = t('generatedCount', simulatedQuestionCount, totalCount);
            }, 1000);
            
            try {
                let chunks = [];
                
                const category = getFileCategory(currentFileType);
                
                if (category === 'page-based') {
                    chunks = splitByPages(extractedText, numGroups);
                } else if (category === 'row-based') {
                    chunks = splitByRows(extractedText, numGroups);
                } else {
                    chunks = overlapSplit(extractedText, numGroups, 500);
                }
                
                const allQuestions = [];
                
                const promises = chunks.map((chunk, i) => {
                    if (!chunk || chunk.trim().length === 0) {
                        console.warn(`Chunk ${i+1} is empty, skipping...`);
                        return Promise.resolve([]);
                    }
                    
                    const startId = i * 20 + 1;
                    const prompt = getGeneratePrompt(chunk, 20, startId, lang, i, chunks.length);
                    
                    return callLLM([{role: "user", content: prompt}])
                        .then(fullResponse => {
                            const questions = extractJSON(fullResponse);
                            questions.forEach((q, idx) => {
                                q.id = startId + idx;
                            });
                            return questions;
                        })
                        .catch(err => {
                            console.error(`Chunk ${i+1} failed:`, err);
                            throw new Error(`Chunk ${i+1} failed: ${err.message}`);
                        });
                });
                
                const allQuestionsArrays = await Promise.all(promises);
                allQuestionsArrays.forEach(arr => allQuestions.push(...arr));
                
                generatedQuestions = allQuestions.slice(0, totalCount);
                
                clearInterval(progressInterval);
                document.getElementById('progressBar').style.width = '100%';
                document.getElementById('questionProgressText').textContent = t('generatedCount', totalCount, totalCount);
                document.getElementById('timeEstimate').textContent = t('estimatedTime', 0);
                document.getElementById('statusText').textContent = t('completed');
                
                setTimeout(() => {
                    document.getElementById('genProgress').classList.add('hidden');
                    disableRefreshProtection();
                    showResultModal(generatedQuestions);
                }, 500);
                
            } catch (err) {
                console.error('Generation error:', err);
                clearInterval(progressInterval);
                document.getElementById('genProgress').classList.add('hidden');
                disableRefreshProtection();
                showToast(err.message, 'error');
            }
        }

        function showResultModal(questions) {
            const container = document.getElementById('resultPreview');
            container.innerHTML = '';
            
            questions.slice(0, 3).forEach((q, idx) => {
                const div = document.createElement('div');
                div.className = 'border border-slate-200 rounded-lg p-4 bg-slate-50';
                div.innerHTML = `
                    <div class="font-medium text-slate-900 mb-2">Q${q.id}: ${q.question}</div>
                    <div class="space-y-1 text-sm text-slate-600 mb-2">
                        ${Object.entries(q.options).map(([k, v]) => `<div>${k}. ${v}</div>`).join('')}
                    </div>
                    <div class="text-sm font-medium text-emerald-600">Answer: ${q.correctAnswer}</div>
                    <div class="text-xs text-slate-400 mt-1">Source: ${q.source}</div>
                `;
                container.appendChild(div);
            });
            
            if (questions.length > 3) {
                const more = document.createElement('div');
                more.className = 'text-center text-slate-500 text-sm';
                more.textContent = `... and ${questions.length - 3} more questions`;
                container.appendChild(more);
            }
            
            document.getElementById('resultModal').classList.remove('hidden');
        }

        function discardResult() {
            if (confirm(t('discardConfirm'))) {
                generatedQuestions = [];
                document.getElementById('resultModal').classList.add('hidden');
                showToast('Discarded', 'success');
            }
        }

        async function saveAndPractice() {
            const name = prompt(currentLang === 'zh' ? '请输入题库名称:' : 
                               currentLang === 'zh-TW' ? '請輸入題庫名稱:' : 
                               currentLang === 'ko' ? '문제은행 이름을 입력하세요:' :
                               'Enter question bank name:', 
                currentFiles[0]?.name.replace(/\.[^/.]+$/, '') || 'New Bank');
            
            if (!name) return;
            
            const bank = {
                name: name,
                questions: generatedQuestions,
                favorites: [],
                createdAt: new Date().toISOString(),
                updatedAt: new Date().toISOString()
            };
            
            const id = await db.questionBanks.add(bank);
            
            if (currentFiles && currentFiles.length > 0) {
                for (const file of currentFiles) {
                    try {
                        await db.sourceFiles.where('name').equals(file.name).modify({ bankId: id });
                    } catch (err) {
                        console.error('Failed to update bankId for file:', file.name, err);
                    }
                }
            }
            
            document.getElementById('resultModal').classList.add('hidden');
            showToast(t('saveSuccess'), 'success');
            
            window.location.href = `practice.html?id=${id}`;
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const icon = document.getElementById('toastIcon');
            const msg = document.getElementById('toastMessage');
            
            msg.textContent = message;
            
            if (type === 'error') {
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>';
                toast.querySelector('div').className = 'bg-red-600 text-white px-6 py-3 rounded-lg shadow-lg flex items-center';
            } else {
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>';
                toast.querySelector('div').className = 'bg-slate-800 text-white px-6 py-3 rounded-lg shadow-lg flex items-center';
            }
            
            toast.classList.remove('translate-y-20', 'opacity-0');
            
            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 3000);
        }

        document.addEventListener('DOMContentLoaded', () => {
            updateLanguage();
            setupDropZone();
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        });
    </script>
</body>
