name = "autumn-fire-bc81"
main = "worker.js"
compatibility_date = "2024-01-01"

# 环境变量（部署时会用到）
[vars]
# 前端网站域名（登录成功后跳转回这个地址）
FRONTEND_URL = "https://www.gpa-buddy.com"

# 这些密钥需要在 Cloudflare Dashboard 或使用 wrangler secret put 设置
# DEEPSEEK_API_KEY = "your-api-key-here"
# MOONSHOT_API_KEY = "your-moonshot-api-key-here"
# GOOGLE_CLIENT_ID = "your-google-client-id"
# TURNSTILE_SECRET_KEY = "your-turnstile-secret-key"

# KV 命名空间绑定
[[kv_namespaces]]
binding = "EXAM_STATS"
id = "06a5a03d25e34f99b3e707188f735abf"

# D1 数据库绑定（用户系统、题库、余额）
[[d1_databases]]
binding = "DB"
database_name = "exam-buddy-db"
database_id = "1ec81241-2e3f-48e8-84b7-53103a947857"
